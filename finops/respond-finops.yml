description: >-
  FinOps view of respond.io spend. Respond.io bills a tiered monthly or annual
  subscription (Starter, Growth, Advanced, Enterprise) that bundles a fixed
  number of users and Monthly Active Contacts (MAC). The primary variable cost
  driver is MAC overage, charged per 100 contacts beyond the included
  allotment (about $12/100 on Growth and $15/100 on Advanced). Per-channel
  messaging fees (e.g. WhatsApp conversation charges) and taxes are passed
  through separately. The Developer API is included from the Growth tier up.
notes: >-
  Subscription prices, included MAC, and overage rates are subject to change;
  verify against the respond.io pricing page and any signed order form during
  reconciliation. Channel pass-through costs depend on the connected providers.
