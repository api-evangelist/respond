meters:
- name: subscription
  description: Recurring plan subscription fee per billing period (Starter / Growth / Advanced).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: monthly_active_contacts
  description: Contacts that sent or received a message in the billing month, counted against the plan's included MAC allotment.
  unit: contacts
  aggregation: sum
  dimensions:
  - account
  - plan
- name: mac_overage
  description: MAC beyond the included allotment, billed per 100 contacts at the plan overage rate.
  unit: contacts
  aggregation: sum
  dimensions:
  - account
  - plan
- name: included_users
  description: User seats bundled in the plan; additional seats billed separately where applicable.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - plan
- name: channel_messaging
  description: Pass-through messaging charges from connected channel providers (e.g. WhatsApp conversation fees).
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - channel
principles:
- name: Visibility
  description: Track active MAC against the included allotment through the workspace billing/usage views to anticipate overage.
- name: Allocation
  description: Tag workspaces, channels, and teams to map subscription and MAC spend to internal cost centers.
- name: Optimization
  description: Right-size the plan tier to actual MAC and user needs; close or merge inactive contacts to reduce MAC; consolidate channels to limit pass-through fees.
- name: Accountability
  description: Assign workspace owners; review MAC trend and overage monthly against budget and renegotiate Enterprise terms at scale.
